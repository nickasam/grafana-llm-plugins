services:
  grafana:
    image: grafana/grafana-oss:8.5.27
    ports:
      - '3000:3000'
    environment:
      # Without this the unsigned plugin will not load (most common failure).
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: easyalgo-hermeschat-app
      GF_DEFAULT_APP_MODE: development
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./dist:/var/lib/grafana/plugins/easyalgo-hermeschat-app
